<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yurufuwa Elegant Talk</title>
    <!-- React & Babel for direct browser execution -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Configuration & Constants ---
        // ★Worker URLをデプロイ後に書き換えてください
        const WORKER_URL  = "https://damp-morning-b89a.mg696.workers.dev";
        const TEXT_MODEL  = "@cf/meta/llama-3.1-8b-instruct";
        const IMAGE_MODEL = "@cf/bytedance/stable-diffusion-xl-lightning";

        const CHARACTERS = {
            yuna: {
                name: "ゆな",
                theme: "from-pink-50 to-rose-100",
                bubble: "bg-pink-50 border-pink-200 text-pink-700",
                accent: "text-rose-400",
                icon: "🌸",
                role: "Rose Sweet",
                personality: "華やかで甘い香りのする20代の綺麗なお姉さん。サクラピンクのリボンやローズの香水、いちごパフェが大好き。少しお茶目で、相手を包み込むような優しさがある。「〜だねぇ」「〜なのっ」という甘い口調。"
            },
            mami: {
                name: "まみ",
                theme: "from-blue-50 to-indigo-100",
                bubble: "bg-blue-50 border-blue-200 text-blue-700",
                accent: "text-indigo-400",
                icon: "💎",
                role: "Blue Elegant",
                personality: "透明感あふれる清楚でエレガントな20代の綺麗なお姉さん。シャーベットブルーのドレスやパールのピアス、ミントティーが大好き。少し天然で、星空のように澄んだ瞳をしている。「〜ですね」「〜かしら」という上品かつ親しみやすい口調。"
            }
        };

        // Helper component for icons
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    const icon = lucide.icons[name];
                    if (icon) {
                        lucide.createIcons({
                            icons: { [name]: icon },
                            attrs: { width: size, height: size, class: className }
                        });
                    }
                }
            }, [name, size, className]);
            return <i ref={iconRef} data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [messages, setMessages] = useState([]);
            const [isTalking, setIsTalking] = useState(false);
            const [currentSpeaker, setCurrentSpeaker] = useState('yuna');
            const [loading, setLoading] = useState(false);
            const [sceneImage, setSceneImage] = useState(null);
            const [imageLoading, setImageLoading] = useState(false);
            const [error, setError] = useState(null);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) {
                    scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                }
            }, [messages]);

            // Worker経由でAPIを呼ぶ共通関数
            const callWorker = async (model, payload, isImage = false, retries = 5) => {
                let delay = 1000;
                for (let i = 0; i < retries; i++) {
                    try {
                        const res = await fetch(WORKER_URL, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ model, payload })
                        });
                        if (res.ok) {
                            return isImage ? await res.blob() : await res.json();
                        }
                        if (res.status === 429 || res.status >= 500) {
                            await new Promise(r => setTimeout(r, delay));
                            delay *= 2;
                            continue;
                        }
                        const errText = await res.text();
                        throw new Error(`Worker Error: ${res.status} - ${errText}`);
                    } catch (e) {
                        if (i === retries - 1) throw e;
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    }
                }
            };

            const generateImage = async () => {
                if (imageLoading) return;
                setImageLoading(true);
                setError(null);

                try {
                    const lastContext = messages.slice(-4).map(m => m.text).join(" ");
                    const situationPrompt = `Create a short, dreamy English description of a setting for two beautiful girls talking based on this: ${lastContext || "They are at a high-end afternoon tea"}. Focus on luxury desserts, pastel colors, and elegant vibes. Output only the description.`;
                    
                    // Step 1: Generate dynamic prompt text using Llama
                    const textResult = await callWorker(TEXT_MODEL, {
                        messages: [
                            { role: "system", content: "You are a prompt engineer for image generation. Output only the prompt in English." },
                            { role: "user", content: situationPrompt }
                        ]
                    }, false);
                    
                    const setting = textResult.result?.response || "A luxurious pastel cafe with crystal chandeliers and massive fruit parfaits.";
                    
                    const finalPrompt = `An ultra-high-quality, masterpiece cinematic 16:9 shot. Two beautiful Japanese women in their early 20s with distinctly different styles. Yuna: Pink-themed, warm, sweet, pink ribbons in wavy hair. Mami: Blue-themed, elegant, cool, pearl accessories in straight-to-wavy hair. They are enjoying yurufuwa girls talk. Aesthetic: Dreamy, pastel, yumekawa, emotional, chill, gorgeous, excellent, elegant. Scene: ${setting}. Include glistening parfaits, cakes, and sweets. Soft diffused lighting, glowing sparkles.`;

                    // Step 2: Generate image using SDXL Lightning
                    const imageBlob = await callWorker(IMAGE_MODEL, { prompt: finalPrompt }, true);

                    const imageUrl = URL.createObjectURL(imageBlob);
                    setSceneImage(imageUrl);
                } catch (e) {
                    setError("お写真の準備がうまくいかなかったみたい...もう一度お願いしてみてね🌸");
                } finally {
                    setImageLoading(false);
                }
            };

            const nextTurn = async () => {
                if (loading) return;
                setLoading(true);
                try {
                    const speaker = CHARACTERS[currentSpeaker];
                    const other = CHARACTERS[currentSpeaker === 'yuna' ? 'mami' : 'yuna'];
                    
                    const systemPrompt = `あなたは「${speaker.name}」です。${speaker.personality}
                    現在は親友の「${other.name}」と二人きりで、最高に贅沢で甘い「パフェ＆ケーキ女子会」をしています。
                    会話のテーマ：ゆるふわ、パステル、ゆめかわ、エモめろ、チル、ゴージャス、エレガント、癒やし、綺麗。
                    相手の言葉を受けて、2〜3文で甘く優雅なメッセージを返してください。
                    言葉遣い例：ゆな「〜だねぇ、ふわふわのクリームに癒やされちゃうなっ」、まみ「〜ですね、この紅茶の香り、とってもエレガントですわ」`;

                    const history = messages.slice(-10).map(m => ({
                        role: m.speaker === currentSpeaker ? "assistant" : "user",
                        content: m.text
                    }));

                    const data = await callWorker(TEXT_MODEL, {
                        messages: [
                            { role: "system", content: systemPrompt },
                            ...history,
                            { role: "user", content: "会話を続けて。" }
                        ]
                    }, false);

                    const response = data.result?.response;
                    if (response) {
                        setMessages(prev => [...prev, {
                            id: Date.now(),
                            speaker: currentSpeaker,
                            name: speaker.name,
                            text: response.trim(),
                            icon: speaker.icon
                        }]);
                        setCurrentSpeaker(prev => prev === 'yuna' ? 'mami' : 'yuna');
                    }
                } catch (e) {
                    setError("お話が途切れちゃった...少し待ってから声をかけてね。");
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                let timer;
                if (isTalking && !loading) {
                    timer = setTimeout(nextTurn, 4000);
                }
                return () => clearTimeout(timer);
            }, [isTalking, loading, currentSpeaker, messages.length]);

            return (
                <div className="flex flex-col h-screen max-w-xl mx-auto bg-[#fffcfd] shadow-2xl relative overflow-hidden text-slate-700">
                    <div className="h-1 bg-gradient-to-r from-pink-200 via-purple-200 to-blue-200" />
                    
                    <header className="px-6 py-4 bg-white/80 backdrop-blur-md flex justify-between items-center z-20 border-b border-pink-50">
                        <div className="flex items-center gap-2">
                            <div className="bg-pink-100 p-1.5 rounded-full">
                                <Icon name="Sparkles" className="text-pink-400" size={20} />
                            </div>
                            <div>
                                <h1 className="font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-purple-400 text-lg">
                                    Yurufuwa Elegant Talk
                                </h1>
                                <p className="text-[10px] text-pink-300 font-medium tracking-tighter uppercase">GORGEOUS EXCELLENT SWEETS TIME</p>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <button 
                                onClick={() => { setMessages([]); setSceneImage(null); setIsTalking(false); }}
                                className="p-2 text-slate-300 hover:text-pink-400 hover:bg-pink-50 rounded-full transition-all"
                            >
                                <Icon name="RefreshCcw" size={18} />
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-hidden flex flex-col relative">
                        <div className="relative group overflow-hidden">
                            <div className="aspect-[16/10] bg-[#fff5f8] relative">
                                {sceneImage ? (
                                    <img 
                                        src={sceneImage} 
                                        className="w-full h-full object-cover animate-in fade-in zoom-in duration-1000" 
                                        alt="Sweet Scene" 
                                    />
                                ) : (
                                    <div className="w-full h-full flex flex-col items-center justify-center text-pink-200">
                                        <Icon name="Coffee" size={48} className="opacity-20 mb-2" />
                                        <p className="text-xs italic">Wonderful memories loading...</p>
                                    </div>
                                )}
                                
                                <div className="absolute top-3 right-3 flex flex-col gap-2">
                                    <button 
                                        onClick={generateImage}
                                        disabled={imageLoading}
                                        className={`p-3 rounded-2xl bg-white/90 shadow-lg border border-pink-100 text-pink-400 transition-all hover:scale-110 active:scale-95 flex flex-col items-center gap-1 ${imageLoading ? 'opacity-50 cursor-wait' : ''}`}
                                    >
                                        <Icon name="Image" size={20} />
                                        <span className="text-[9px] font-bold">生成</span>
                                    </button>
                                </div>

                                {imageLoading && (
                                    <div className="absolute inset-0 bg-white/60 backdrop-blur-[2px] flex items-center justify-center z-10">
                                        <div className="flex flex-col items-center">
                                            <div className="relative">
                                                <div className="w-12 h-12 border-4 border-pink-100 border-t-pink-400 rounded-full animate-spin"></div>
                                                <div className="absolute inset-0 m-auto flex items-center justify-center">
                                                    <Icon name="Heart" className="text-pink-300 animate-pulse" size={16} />
                                                </div>
                                            </div>
                                            <span className="mt-3 text-[11px] font-bold text-pink-400 tracking-[0.2em] animate-pulse">CREATING MAGIC...</span>
                                        </div>
                                    </div>
                                )}
                                
                                <div className="absolute bottom-4 left-4 right-4 flex justify-between pointer-events-none">
                                    <div className={`px-4 py-1.5 rounded-full bg-white/90 backdrop-blur shadow-sm border flex items-center gap-2 transition-all duration-500 ${currentSpeaker === 'yuna' ? 'border-pink-300 scale-110 ring-2 ring-pink-100' : 'border-transparent opacity-60 scale-90'}`}>
                                        <span className="text-sm">🌸</span>
                                        <span className="text-xs font-bold text-pink-500">Yuna</span>
                                    </div>
                                    <div className={`px-4 py-1.5 rounded-full bg-white/90 backdrop-blur shadow-sm border flex items-center gap-2 transition-all duration-500 ${currentSpeaker === 'mami' ? 'border-blue-300 scale-110 ring-2 ring-blue-100' : 'border-transparent opacity-60 scale-90'}`}>
                                        <span className="text-xs font-bold text-blue-500">Mami</span>
                                        <span className="text-sm">💎</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div ref={scrollRef} className="flex-1 overflow-y-auto px-6 py-6 space-y-6 scroll-smooth bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-fixed">
                            {messages.length === 0 && (
                                <div className="h-full flex flex-col items-center justify-center text-pink-200 italic space-y-4">
                                    <div className="w-20 h-20 border-2 border-dashed border-pink-100 rounded-full flex items-center justify-center">
                                        <Icon name="Star" className="animate-spin-slow" />
                                    </div>
                                    <p className="text-sm">秘密の女子会を始めましょう...</p>
                                </div>
                            )}
                            
                            {messages.map((msg) => (
                                <div key={msg.id} className={`flex ${msg.speaker === 'yuna' ? 'justify-start' : 'justify-end'} animate-in slide-in-from-bottom-4 duration-500`}>
                                    <div className={`flex max-w-[85%] gap-3 ${msg.speaker === 'yuna' ? 'flex-row' : 'flex-row-reverse'}`}>
                                        <div className={`relative flex-shrink-0`}>
                                            <div className={`w-10 h-10 rounded-full flex items-center justify-center text-xl bg-white shadow-md border-2 ${msg.speaker === 'yuna' ? 'border-pink-100' : 'border-blue-100'}`}>
                                                {msg.icon}
                                            </div>
                                            <div className={`absolute -bottom-1 -right-1 w-4 h-4 rounded-full flex items-center justify-center border border-white ${msg.speaker === 'yuna' ? 'bg-pink-400' : 'bg-blue-400'}`}>
                                                <Icon name="Heart" className="text-white" size={8} />
                                            </div>
                                        </div>

                                        <div className="space-y-1">
                                            <span className={`text-[10px] font-bold uppercase tracking-widest block ${msg.speaker === 'yuna' ? 'text-pink-400 ml-1' : 'text-blue-400 mr-1 text-right'}`}>
                                                {msg.speaker === 'yuna' ? 'Rose Sweet' : 'Blue Elegant'}
                                            </span>
                                            <div className={`p-4 rounded-3xl shadow-sm border leading-relaxed text-sm relative ${CHARACTERS[msg.speaker].bubble}`}>
                                                {msg.text}
                                                <div className={`absolute top-0 ${msg.speaker === 'yuna' ? 'left-0' : 'right-0'} w-4 h-4 opacity-10`}>
                                                    <Icon name="Star" size={12} />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}

                            {loading && (
                                <div className={`flex ${currentSpeaker === 'yuna' ? 'justify-start' : 'justify-end'} animate-pulse`}>
                                    <div className="flex gap-2 items-center px-4 py-2 bg-white rounded-full border border-pink-50 shadow-sm">
                                        <div className="w-1.5 h-1.5 bg-pink-300 rounded-full animate-bounce"></div>
                                        <div className="w-1.5 h-1.5 bg-pink-300 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                                        <div className="w-1.5 h-1.5 bg-pink-300 rounded-full animate-bounce [animation-delay:0.4s]"></div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {error && (
                        <div className="absolute top-20 left-4 right-4 bg-rose-50/90 backdrop-blur border border-rose-100 text-rose-500 px-4 py-2 rounded-xl text-xs text-center shadow-xl z-50 flex items-center justify-center gap-2">
                            <Icon name="Star" size={12} />
                            {error}
                        </div>
                    )}

                    <footer className="p-6 bg-white border-t border-pink-50 z-30">
                        <div className="flex gap-4">
                            <button 
                                onClick={() => {
                                    const next = !isTalking;
                                    setIsTalking(next);
                                    setError(null);
                                    if (next && messages.length === 0) {
                                        nextTurn();
                                        generateImage();
                                    }
                                }}
                                className={`flex-1 group relative py-4 rounded-[2rem] font-bold text-white shadow-xl transition-all active:scale-95 flex items-center justify-center gap-3 overflow-hidden ${isTalking ? 'bg-slate-300' : 'bg-gradient-to-br from-pink-300 via-rose-300 to-purple-300'}`}
                            >
                                <div className="absolute inset-0 bg-white/20 translate-y-[-50%] skew-y-12 opacity-0 group-hover:opacity-100 transition-all pointer-events-none" />
                                
                                {isTalking ? (
                                    <><Icon name="CircleStop" size={22} className="text-white/80" /> お休みする</>
                                ) : (
                                    <><Icon name="MessageCircleHeart" size={22} className="animate-pulse" /> トーク開始</>
                                )}
                            </button>
                        </div>
                        
                        <p className="mt-4 text-center text-[10px] text-pink-200 font-medium tracking-[0.3em] uppercase">
                            ✦ Premium Girls Talk Session ✦
                        </p>
                    </footer>

                    <div className="absolute inset-0 pointer-events-none z-10 overflow-hidden">
                        <div className="absolute top-[20%] left-[10%] opacity-20 animate-pulse"><Icon name="Sparkles" className="text-pink-200" size={14} /></div>
                        <div className="absolute top-[60%] right-[15%] opacity-20 animate-pulse delay-700"><Icon name="Sparkles" className="text-blue-200" size={12} /></div>
                        <div className="absolute bottom-[25%] left-[20%] opacity-20 animate-pulse delay-500"><Icon name="Heart" className="text-pink-100" size={10} /></div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
